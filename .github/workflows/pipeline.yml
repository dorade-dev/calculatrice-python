name: Pipeline Calculatrice Dorade

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Lancer les tests
        run: |
          python3 -c "
          import calculatrice
          assert calculatrice.additionner(10, 5) == 15
          assert calculatrice.soustraire(10, 5) == 5
          assert calculatrice.multiplier(10, 5) == 50
          assert calculatrice.diviser(10, 5) == 2.0
          assert calculatrice.diviser(10, 0) == 'Erreur : division par zéro'
          print('Tous les tests sont passés !')
          "

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Construire l'image Docker
        run: docker build -t calculatrice-dorade .

      - name: Vérifier l'image
        run: docker images calculatrice-dorade
